<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fable</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-stone-50">

    <main class="max-w-4xl mx-auto p-8">

        <a
            href="/"
            class="text-amber-700 font-semibold">
            ← Back to Library
        </a>

        <div class="mt-8">

            <div
                id="loading"
                class="text-stone-500">
                Loading fable...
            </div>

            <article
                id="fable-container"
                class="hidden">

                <span
                    id="category"
                    class="text-xs font-bold text-emerald-700">
                </span>

                <h1
                    id="title"
                    class="mt-4 text-4xl font-bold">
                </h1>

                <p
                    id="author"
                    class="mt-2 text-stone-500">
                </p>

                <div
                    id="story"
                    class="mt-8 whitespace-pre-line text-lg leading-relaxed">
                </div>

                <div
                    class="mt-10 rounded-xl bg-amber-50 p-6">

                    <h2
                        class="font-bold">
                        Moral
                    </h2>

                    <p
                        id="moral"
                        class="mt-2">
                    </p>

                </div>

            </article>

        </div>

    </main>

    <script src="fable.js"></script>

</body>
</html>
